    function nl2br(str) { if (!str) return ''; return str.replace(/\n/g, '<br>'); }
    function saveData() { localStorage.setItem("shop_titles", JSON.stringify(titles)); localStorage.setItem("shop_products", JSON.stringify(products)); localStorage.setItem("shop_siteInfo", JSON.stringify(siteInfo)); localStorage.setItem("shop_noticeInfo", JSON.stringify(noticeInfo)); }
    function loadData() { 
        const storedTitles = localStorage.getItem("shop_titles");
        const storedProducts = localStorage.getItem("shop_products");
        const storedSiteInfo = localStorage.getItem("shop_siteInfo");
        const storedNoticeInfo = localStorage.getItem("shop_noticeInfo");
        if (storedTitles && storedProducts) { titles = JSON.parse(storedTitles); products = JSON.parse(storedProducts); }
        if (storedSiteInfo) siteInfo = JSON.parse(storedSiteInfo);
        if (storedNoticeInfo) noticeInfo = JSON.parse(storedNoticeInfo);
        else saveData();
        renderSiteInfo();
        renderNoticeInfo();
    }
    function renderSiteInfo() { document.getElementById('updateInfo').innerHTML = siteInfo.updateInfo; document.getElementById('snsInfo').innerHTML = siteInfo.snsInfo; document.getElementById('paymentInfo').innerHTML = siteInfo.paymentInfo; if(document.getElementById('editUpdateInfo')) { document.getElementById('editUpdateInfo').value = siteInfo.updateInfo; document.getElementById('editSnsInfo').value = siteInfo.snsInfo; document.getElementById('editPaymentInfo').value = siteInfo.paymentInfo; } }
    function renderNoticeInfo() { document.getElementById('noticeInfo').innerHTML = nl2br(escapeHtml(noticeInfo)); if(document.getElementById('editNoticeInfo')) document.getElementById('editNoticeInfo').value = noticeInfo; }
    function saveSiteInfo() { siteInfo.updateInfo = document.getElementById('editUpdateInfo').value; siteInfo.snsInfo = document.getElementById('editSnsInfo').value; siteInfo.paymentInfo = document.getElementById('editPaymentInfo').value; saveData(); renderSiteInfo(); alert("サイト情報を保存しました"); }
    function saveNoticeInfo() { noticeInfo = document.getElementById('editNoticeInfo').value; saveData(); renderNoticeInfo(); alert("注意事項を保存しました"); }
    
    function renderGameTitles() {
        const container = document.getElementById('gameContainer');
        if (!container) return;
        container.innerHTML = '';
        titles.forEach((title) => {
            const card = document.createElement('div'); card.className = 'game-card';
            const iconUrl = title.imageUrl && title.imageUrl !== "" ? title.imageUrl : "data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2240%22%20height%3D%2240%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%238899A6%22%3E%3Cpath%20d%3D%22M12%202C6.48%202%202%206.48%202%2012s4.48%2010%2010%2010%2010-4.48%2010-10S17.52%202%2012%202zm0%203c1.66%200%203%201.34%203%203s-1.34%203-3%203-3-1.34-3-3%201.34-3%203-3zm0%2014.2c-2.5%200-4.71-1.28-6-3.22.03-1.99%204-3.08%206-3.08%201.99%200%205.97%201.09%206%203.08-1.29%201.94-3.5%203.22-6%203.22z%22%2F%3E%3C%2Fsvg%3E";
            card.innerHTML = `<img class="game-icon-img" src="${iconUrl}" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2240%22%20height%3D%2240%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%238899A6%22%3E%3Cpath%20d%3D%22M12%202C6.48%202%202%206.48%202%2012s4.48%2010%2010%2010%2010-4.48%2010-10S17.52%202%2012%202zm0%203c1.66%200%203%201.34%203%203s-1.34%203-3%203-3-1.34-3-3%201.34-3%203-3zm0%2014.2c-2.5%200-4.71-1.28-6-3.22.03-1.99%204-3.08%206-3.08%201.99%200%205.97%201.09%206%203.08-1.29%201.94-3.5%203.22-6%203.22z%22%2F%3E%3C%2Fsvg%3E'"><span class="game-name">${escapeHtml(title.name)}</span>`;
            card.addEventListener('click', () => showProductPopup(title.key, title.name, title.imageUrl));
            container.appendChild(card);
        });
    }
    
    let currentCategoryKey = null;
    function showProductPopup(categoryKey, displayName, iconUrl) {
        currentCategoryKey = categoryKey;
        const filtered = products.filter(p => p.category === categoryKey);
        const headerIconUrl = (iconUrl && iconUrl.trim() !== '') ? iconUrl : "data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2248%22%20height%3D%2248%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%238899A6%22%3E%3Cpath%20d%3D%22M12%202C6.48%202%202%206.48%202%2012s4.48%2010%2010%2010%2010-4.48%2010-10S17.52%202%2012%202zm0%203c1.66%200%203%201.34%203%203s-1.34%203-3%203-3-1.34-3-3%201.34-3%203-3zm0%2014.2c-2.5%200-4.71-1.28-6-3.22.03-1.99%204-3.08%206-3.08%201.99%200%205.97%201.09%206%203.08-1.29%201.94-3.5%203.22-6%203.22z%22%2F%3E%3C%2Fsvg%3E";
        document.getElementById('popupGameIconImg').src = headerIconUrl;
        document.getElementById('popupGameName').innerHTML = escapeHtml(displayName);
        const listContainer = document.getElementById('popupProductList');
        if (filtered.length === 0) listContainer.innerHTML = '<div style="text-align:center; padding:20px;">まだ商品がありません。</div>';
        else {
            listContainer.innerHTML = '';
            filtered.forEach(p => {
                const itemDiv = document.createElement('div'); itemDiv.className = 'popup-product-item';
                itemDiv.innerHTML = `<div class="popup-product-title">${escapeHtml(p.title)}</div><div class="popup-product-desc">${nl2br(escapeHtml(p.description))}</div><div class="popup-product-price">${escapeHtml(p.price)}</div><a href="${escapeHtml(p.contactUrl)}" target="_blank" class="popup-contact-btn">📩 問い合わせる</a>`;
                listContainer.appendChild(itemDiv);
            });
        }
        document.getElementById('productPopupModal').style.display = 'block';
    }
    
    function refreshTitleSelects() {
        const selectForRename = document.getElementById('selectTitleForRename');
        const selectForIcon = document.getElementById('selectTitleForIcon');
        const selectForDelete = document.getElementById('selectTitleForDelete');
        const optionsHtml = titles.map(t => `<option value="${t.key}">${escapeHtml(t.name)}</option>`).join('');
        if (selectForRename) selectForRename.innerHTML = optionsHtml;
        if (selectForIcon) selectForIcon.innerHTML = optionsHtml;
        if (selectForDelete) selectForDelete.innerHTML = optionsHtml;
    }
    
    function addTitle() { const name = document.getElementById('newTitleName').value.trim(); if(!name) { alert("タイトル名を入力してください"); return; } const key = "title_" + Date.now(); titles.push({ key, name, imageUrl: document.getElementById('newTitleImage').value.trim() }); saveData(); renderGameTitles(); refreshTitleSelects(); alert("追加しました"); document.getElementById('newTitleName').value = ''; document.getElementById('newTitleImage').value = ''; }
    function renameTitle() { const key = document.getElementById('selectTitleForRename').value; const newName = document.getElementById('renameTitleName').value.trim(); if(!newName) { alert("新しいタイトル名を入力してください"); return; } const title = titles.find(t => t.key === key); if(title) { title.name = newName; saveData(); renderGameTitles(); refreshTitleSelects(); alert("変更しました"); document.getElementById('renameTitleName').value = ''; } }
    function updateIcon() { const key = document.getElementById('selectTitleForIcon').value; const newUrl = document.getElementById('iconImageUrl').value.trim(); const title = titles.find(t => t.key === key); if(title) { title.imageUrl = newUrl; saveData(); renderGameTitles(); alert("アイコンを更新しました"); document.getElementById('iconImageUrl').value = ''; } }
    function deleteTitle() { const key = document.getElementById('selectTitleForDelete').value; if(!confirm("タイトルを削除すると商品も全て消えます。よろしいですか？")) return; titles = titles.filter(t => t.key !== key); products = products.filter(p => p.category !== key); saveData(); renderGameTitles(); refreshTitleSelects(); alert("削除しました"); }
    
    function openProductEditor() {
        if (!currentCategoryKey) return;
        const categoryProducts = products.filter(p => p.category === currentCategoryKey);
        const container = document.getElementById('productEditList');
        container.innerHTML = '';
        if (categoryProducts.length === 0) container.innerHTML = '<p style="color:#8899A6; text-align:center;">商品がありません。「新規商品を追加」してください。</p>';
        categoryProducts.forEach((p, idx) => {
            const globalIdx = products.findIndex(prod => prod === p);
            const div = document.createElement('div'); div.className = 'product-editor-item';
            div.innerHTML = `<label>商品タイトル</label><input type="text" id="edit_title_${idx}" value="${escapeHtml(p.title)}"><label>商品詳細（改行可）</label><textarea id="edit_desc_${idx}" rows="3">${escapeHtml(p.description)}</textarea><label>金額</label><input type="text" id="edit_price_${idx}" value="${escapeHtml(p.price)}"><button class="save-edit" data-idx="${globalIdx}" data-local="${idx}">💾 更新</button><button class="delete-edit" data-idx="${globalIdx}">🗑 削除</button>`;
            container.appendChild(div);
        });
        document.querySelectorAll('.save-edit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const globalIdx = parseInt(btn.dataset.idx);
                const localIdx = parseInt(btn.dataset.local);
                products[globalIdx] = { ...products[globalIdx], title: document.getElementById(`edit_title_${localIdx}`).value, description: document.getElementById(`edit_desc_${localIdx}`).value, price: document.getElementById(`edit_price_${localIdx}`).value };
                saveData(); openProductEditor(); const titleInfo = titles.find(t => t.key === currentCategoryKey); if(titleInfo) showProductPopup(currentCategoryKey, titleInfo.name, titleInfo.imageUrl);
            });
        });
        document.querySelectorAll('.delete-edit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const globalIdx = parseInt(btn.dataset.idx);
                if(confirm("削除しますか？")) { products.splice(globalIdx,1); saveData(); openProductEditor(); const titleInfo = titles.find(t => t.key === currentCategoryKey); if(titleInfo) showProductPopup(currentCategoryKey, titleInfo.name, titleInfo.imageUrl); }
            });
        });
        document.getElementById('productEditModal').style.display = 'block';
    }
    function addProductInEdit() { if(currentCategoryKey) { products.push({ category: currentCategoryKey, title: "新商品", description: "説明文を入力", price: "0円", contactUrl: commonContactUrl, imageUrl: "" }); saveData(); openProductEditor(); const titleInfo = titles.find(t => t.key === currentCategoryKey); if(titleInfo) showProductPopup(currentCategoryKey, titleInfo.name, titleInfo.imageUrl); } }
    
    document.getElementById('accordionHeader1').addEventListener('click', () => { document.getElementById('accordionBody1').classList.toggle('open'); document.querySelector('.icon1').style.transform = document.getElementById('accordionBody1').classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)'; });
    document.getElementById('accordionHeader2').addEventListener('click', () => { document.getElementById('accordionBody2').classList.toggle('open'); document.querySelector('.icon2').style.transform = document.getElementById('accordionBody2').classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)'; });
    
    document.getElementById('openAdminBtn').addEventListener('click', () => { const pwd = prompt("パスワードを入力してください"); if (pwd === "antin2811a") { refreshTitleSelects(); renderSiteInfo(); renderNoticeInfo(); document.getElementById('adminModal').style.display = "block"; } else if (pwd !== null) alert("パスワードが違います"); });
    document.getElementById('closeAdminBtn').addEventListener('click', () => { document.getElementById('adminModal').style.display = "none"; });
    document.getElementById('saveSiteInfoBtn').addEventListener('click', saveSiteInfo);
    document.getElementById('saveNoticeBtn').addEventListener('click', saveNoticeInfo);
    document.getElementById('addTitleBtn').addEventListener('click', addTitle);
    document.getElementById('renameTitleBtn').addEventListener('click', renameTitle);
    document.getElementById('updateIconBtn').addEventListener('click', updateIcon);
    document.getElementById('deleteTitleBtn').addEventListener('click', deleteTitle);
    document.getElementById('closePopupBtn').addEventListener('click', () => { document.getElementById('productPopupModal').style.display = 'none'; });
    document.getElementById('popupEditBtn').addEventListener('click', () => { const pwd = prompt("商品編集にはパスワードが必要です"); if (pwd === "antin2811a") openProductEditor(); else if (pwd !== null) alert("パスワードが違います"); });
    document.getElementById('closeProductEditBtn').addEventListener('click', () => { document.getElementById('productEditModal').style.display = 'none'; });
    document.getElementById('addProductInEditBtn').addEventListener('click', addProductInEdit);
    window.addEventListener('click', (e) => { if (e.target === document.getElementById('productPopupModal')) document.getElementById('productPopupModal').style.display = 'none'; if (e.target === document.getElementById('adminModal')) document.getElementById('adminModal').style.display = 'none'; });
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    loadData(); renderGameTitles();
</script>
